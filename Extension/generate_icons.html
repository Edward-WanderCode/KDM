<!DOCTYPE html>
<html>
<body>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size;
  
  // Background circle
  ctx.beginPath();
  ctx.arc(s/2, s/2, s/2 - 1, 0, Math.PI * 2);
  ctx.fillStyle = '#0D1117';
  ctx.fill();
  ctx.strokeStyle = '#30363D';
  ctx.lineWidth = Math.max(1, s * 0.04);
  ctx.stroke();
  
  // Arrow down
  const cx = s/2;
  const arrowW = s * 0.35;
  const arrowH = s * 0.25;
  const shaftW = s * 0.15;
  const topY = s * 0.2;
  const midY = s * 0.48;
  const botY = s * 0.7;
  
  ctx.beginPath();
  // Shaft
  ctx.moveTo(cx - shaftW, topY);
  ctx.lineTo(cx + shaftW, topY);
  ctx.lineTo(cx + shaftW, midY);
  // Arrow head right
  ctx.lineTo(cx + arrowW, midY);
  // Arrow point
  ctx.lineTo(cx, botY);
  // Arrow head left
  ctx.lineTo(cx - arrowW, midY);
  ctx.lineTo(cx - shaftW, midY);
  ctx.closePath();
  
  const grad = ctx.createLinearGradient(0, topY, 0, botY);
  grad.addColorStop(0, '#58A6FF');
  grad.addColorStop(1, '#3FB950');
  ctx.fillStyle = grad;
  ctx.fill();
  
  // Bottom line
  const lineY = s * 0.78;
  ctx.beginPath();
  ctx.moveTo(s * 0.22, lineY);
  ctx.lineTo(s * 0.78, lineY);
  ctx.strokeStyle = '#8B949E';
  ctx.lineWidth = Math.max(1.5, s * 0.05);
  ctx.lineCap = 'round';
  ctx.stroke();
}

[16, 48, 128].forEach(size => {
  const canvas = document.getElementById('c' + size);
  drawIcon(canvas, size);
  
  // Download as PNG
  const link = document.createElement('a');
  link.download = `icon${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});
</script>
</body>
</html>
